<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Monitoring Toko</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .card:hover {
      transform: translateY(-5px);
      transition: 0.3s;
    }
  </style>

  <script src="js/app.js" defer></script>
</head>

<body class="bg-gray-100 p-6">

  <h1 class="text-3xl font-bold text-emerald-600 mb-6">
    🏪 Dashboard Toko Kelontong
  </h1>

  <!-- FILTER -->
  <div class="flex gap-3 mb-6">
    <button onclick="filterData('all')" class="bg-gray-200 px-4 py-2 rounded">Semua</button>
    <button onclick="filterData('stok')" class="bg-gray-200 px-4 py-2 rounded">Stok</button>
    <button onclick="filterData('operasional')" class="bg-gray-200 px-4 py-2 rounded">Operasional</button>
  </div>

  <!-- SUMMARY -->
  <div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

  <!-- ERROR -->
  <div id="errorBox" class="text-red-600 mb-4"></div>

  <!-- DATA -->
  <div id="container" class="grid md:grid-cols-3 gap-4"></div>

</body>
</html>
