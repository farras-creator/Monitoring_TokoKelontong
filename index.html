<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Monitoring Toko</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Dashboard Monitoring Toko Kelontong</title>

  <!-- Penghubung ke Tailwind CSS dari CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Penghubung HTML ke file CSS lokal -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Penghubung HTML ke file JavaScript lokal -->
  <script src="js/app.js" defer></script>
</head>

  <style>
    .card:hover {
      transform: translateY(-5px);
      transition: 0.3s;
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }
  </style>

  <script src="js/app.js" defer></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen p-6">

  <h1 class="text-4xl font-bold text-emerald-600 mb-6">
    🏪 Dashboard Toko Kelontong
  </h1>

  <!-- CONTROL -->
  <div class="flex gap-3 mb-6 flex-wrap">
    <button onclick="loadSensorData()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg">
      Load Data
    </button>

    <button onclick="filterData('all')" class="bg-gray-200 px-4 py-2 rounded-lg">Semua</button>
    <button onclick="filterData('stok')" class="bg-gray-200 px-4 py-2 rounded-lg">Stok</button>
    <button onclick="filterData('operasional')" class="bg-gray-200 px-4 py-2 rounded-lg">Operasional</button>
  </div>

  <!-- SUMMARY -->
  <div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

  <!-- ERROR -->
  <div id="errorBox" class="text-red-600 mb-4"></div>

  <!-- DATA -->
  <div id="container" class="grid md:grid-cols-3 gap-4"></div>

</body>
</html>
